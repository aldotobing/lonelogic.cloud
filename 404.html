<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — not found</title>
    <meta name="robots" content="noindex">

    <!-- OG Tags -->
    <meta property="og:title" content="lonelogic — 404">
    <meta property="og:description" content="page not found — no such file or directory.">
    <meta property="og:image" content="https://lonelogic.cloud/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lonelogic.cloud">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #09090d;
            --surface:   #16161f;
            --border:    #252532;
            --text:      #e4e4eb;
            --text-secondary: #a0a0b3;
            --text-dim:  #6b6b7e;
            --accent:    #b392f0;
            --accent-glow: rgba(179, 146, 240, 0.10);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
            --radius: 12px;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* background glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 40%, rgba(179, 146, 240, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* noise */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 480px;
        }

        .code-block {
            font-family: var(--font-mono);
            font-size: 5rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
            user-select: none;
        }

        .message {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .message .dim {
            color: var(--text-dim);
        }

        .message .keyword {
            color: var(--accent);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: border-color 0.25s, color 0.25s, box-shadow 0.25s;
        }

        .home-link:hover {
            border-color: var(--accent);
            color: var(--text);
            box-shadow: 0 0 24px var(--accent-glow);
        }

        @media (max-width: 480px) {
            .code-block {
                font-size: 3.5rem;
            }
            .message {
                font-size: 0.75rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code-block">404</div>
        <p class="message">
            <span class="keyword">$</span> cd /var/www/lonelogic.cloud<span class="dim">/this-page</span><br>
            <span class="dim">bash: cd:</span> no such file or directory<br>
            <span class="keyword">~</span> <span class="dim">■</span>
        </p>
        <a href="/" class="home-link">← cd ~</a>
    </div>
</body>
</html>
